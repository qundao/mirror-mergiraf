on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  test:
    # uses Docker image in .forgejo/workflows/Dockerfile,
    # also available at https://hub.docker.com/r/pintoch/ubuntu-act-with-rust
    runs-on: ubuntu-with-rust-1.91
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - id: get-rust-version
        name: Get Rust version (for caching)
        run: echo "rust-version='$(rustc -V)'" >> $FORGEJO_OUTPUT
        # FIXME(wetneb): remove the following step once jj is installed in the runner
        # but don't remove the one afterwards, as it's useful for caching (?)
      - name: Install Jujutsu
        run: cargo binstall jj-cli --version 0.41.0 -y --strategies crate-meta-data
      - id: get-jj-version
        name: Get Jujutsu version (for caching)
        run: echo "version='$(jj -V)'" >> $FORGEJO_OUTPUT
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: "${{runner.os}} Rust ${{ steps.get-rust-version.outputs.rust-version }} ${{ steps.get-jj-version.outputs.version }} lock ${{ hashFiles('**/Cargo.lock') }}"
      - name: Format
        run: cargo fmt --all -- --check || (echo "\nPlease run 'cargo fmt --all' and push the results.\n"; /bin/false)
      - name: Check
        run: cargo check --workspace --all-features --all-targets --locked
        # For https://codeberg.org/mergiraf/mergiraf/pulls/666
      - name: Check without debug-assertions
        run: cargo check --config profile.debug.debug-assertions=false --workspace --all-features --all-targets --locked
      - name: Lint
        run: cargo clippy --workspace --all-features --all-targets --locked -- -Dwarnings -W clippy::dbg_macro
      - name: Run tests
        run: cargo test --workspace --all-features --locked
